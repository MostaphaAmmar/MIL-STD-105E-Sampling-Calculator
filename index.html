<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIL-STD-105E Sampling Calculator</title>

<style>
body { font-family: Arial, sans-serif; padding: 20px; }

label { display:block; margin-bottom:5px; font-weight:bold; }

select,input,button{
margin-bottom:15px;
padding:8px;
width:100%;
}

.result{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

.hidden{display:none;}

.tabs{
display:flex;
margin-bottom:20px;
}

.tab-button{
padding:10px;
border:none;
background:#ddd;
cursor:pointer;
margin-right:5px;
}

.tab-button.active{
background:#4285f4;
color:white;
}

.tab-content{display:none;}
.tab-content.active{display:block;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{max-height:80px;}
</style>

</head>
<body>

<div class="header">
<img src="Scitra logo.jpg" class="logo">
<div>
<h2>QC Section</h2>
<h3>Quality Department</h3>
</div>
</div>

<div class="tabs">
<button class="tab-button active" onclick="openTab('milstd')">MIL-STD-105E Calculator</button>
<button class="tab-button" onclick="openTab('production')">Production Sampling Interval</button>
</div>

<!-- TAB 1 -->
<div id="milstd" class="tab-content active">

<h2>MIL-STD-105E / ISO 2859-1 Sampling Calculator</h2>

<label>Lot Size:</label>
<input type="number" id="lotSize" min="300">

<label>General Inspection Level:</label>
<select id="inspectionLevel">
<option value="I">Level I</option>
<option value="II" selected>Level II</option>
<option value="III">Level III</option>
</select>

<label>Inspection Status:</label>
<select id="inspectionStatus">
<option value="normal">Normal</option>
<option value="tightened">Tightened</option>
<option value="reduced">Reduced</option>
</select>

<button onclick="calculateSampleSize()">Calculate Sample Size</button>

<div class="result" id="sampleSize"></div>

</div>

<!-- TAB 2 -->
<div id="production" class="tab-content">

<h2>Production Sampling Interval Calculator</h2>

<label>Batch Size:</label>
<input type="number" id="batchSize">

<label>Production Line:</label>
<select id="lineSelect">

<option value="40">01-Master Fill (40)</option>
<option value="40">02-Fill Pack 60 (40)</option>
<option value="160">03-RONCHI (160)</option>
<option value="70">04-Norden (70)</option>
<option value="20">05-Ticket Filling (20)</option>
<option value="90">06-Groninger (90)</option>
<option value="40">07-Fill Pack 40 (40)</option>
<option value="40">08-Optima (40)</option>
<option value="16">09-Wax Stick (16)</option>
<option value="30">01-Mes Pack (30)</option>
<option value="20">02-Thomson (20)</option>
<option value="37">03-Aranow (37)</option>

</select>

<label>Inspection Level:</label>
<select id="samplingLevel">
<option value="normal">Normal</option>
<option value="reduced">Reduced</option>
<option value="tightened">Extensive</option>
</select>

<button onclick="calculateProductionSampling()">Calculate Sampling Plan</button>

<div class="result" id="productionResult"></div>

</div>

<script>

// TAB SWITCH
function openTab(tabId){

document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tab-button').forEach(b=>b.classList.remove('active'));

document.getElementById(tabId).classList.add('active');

event.target.classList.add('active');
}

// MIL STD TABLES
const normalTable = {A:2,B:3,C:5,D:8,E:13,F:20,G:32,H:50,J:80,K:125,L:200,M:315,N:500,P:800};
const reducedTable = {A:2,B:2,C:3,D:5,E:8,F:13,G:20,H:32,J:50,K:80,L:80,M:125,N:200,P:315};
const tightenedTable = {A:3,B:5,C:8,D:13,E:20,F:32,G:50,H:80,J:125,K:200,L:315,M:500,N:800,P:1250};

// CODE LETTER
function getCodeLetter(lotSize){

if(lotSize<=500)return 'B';
else if(lotSize<=1200)return 'C';
else if(lotSize<=3200)return 'D';
else if(lotSize<=10000)return 'L';
else if(lotSize<=35000)return 'M';
else if(lotSize<=150000)return 'N';
else return 'P';

}

// GET SAMPLE SIZE
function getSampleSize(letter,status){

if(status==='normal')return normalTable[letter];
if(status==='reduced')return reducedTable[letter];
if(status==='tightened')return tightenedTable[letter];

return normalTable[letter];
}

// ORIGINAL CALCULATOR
function calculateSampleSize(){

let lotSize=parseInt(document.getElementById('lotSize').value);
let status=document.getElementById('inspectionStatus').value;

let letter=getCodeLetter(lotSize);
let sample=getSampleSize(letter,status);

document.getElementById('sampleSize').innerText=
`Lot Size ${lotSize} → Code Letter ${letter} → Sample Size ${sample}`;

}

// NEW PRODUCTION SAMPLING
function calculateProductionSampling(){

let batch=parseFloat(document.getElementById('batchSize').value);
let speed=parseFloat(document.getElementById('lineSelect').value);
let level=document.getElementById('samplingLevel').value;

if(!batch||!speed){
alert("Enter batch size");
return;
}

// batch cycle time
let batchCycle=batch/speed;

// sampling interval
let samplingInterval=batchCycle/30;

// MIL STD sample size
let letter=getCodeLetter(batch);
let sampleSize=getSampleSize(letter,level);

// sample per interval
let Y=sampleSize/samplingInterval;

Y=Math.ceil(Y);

document.getElementById("productionResult").innerText=
`Batch Cycle Time: ${batchCycle.toFixed(1)} min
Sampling Interval: ${samplingInterval.toFixed(2)}
Total Sample Size: ${sampleSize}

The sample size is ${Y} units per 30 minutes`;

}

</script>

</body>
</html>
